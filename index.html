<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网文写作助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* 顶部导航 */
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            min-height: calc(100vh - 70px);
        }

        /* 侧边栏 */
        .sidebar {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .sidebar-title {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .tool-list {
            list-style: none;
        }

        .tool-item {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .tool-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .tool-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .tool-icon {
            font-size: 1.2rem;
        }

        /* 主内容区 */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* 写作面板 */
        .writing-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .word-count {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }

        .writing-area {
            width: 100%;
            min-height: 300px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1rem;
            color: #fff;
            font-size: 1rem;
            line-height: 1.8;
            resize: vertical;
            font-family: inherit;
        }

        .writing-area:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
        }

        .writing-area::placeholder {
            color: rgba(255,255,255,0.3);
        }

        /* 操作栏 */
        .action-bar {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        /* 输出面板 */
        .output-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.5rem;
            flex: 1;
        }

        .output-content {
            min-height: 200px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 1rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .output-placeholder {
            color: rgba(255,255,255,0.3);
            font-style: italic;
        }

        /* 加载动画 */
        .loading {
            display: none;
            align-items: center;
            gap: 0.5rem;
            color: rgba(255,255,255,0.5);
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 提示词模板 */
        .templates {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .template-title {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.75rem;
        }

        .template-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .template-tag {
            padding: 0.3rem 0.8rem;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .template-tag:hover {
            background: rgba(102, 126, 234, 0.3);
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: static;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">✍️ 网文写作助手</div>
        <div class="header-actions">
            <button class="btn btn-secondary">📁 我的作品</button>
            <button class="btn btn-secondary">📚 素材库</button>
            <button class="btn btn-primary">⚡ AI 设置</button>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-title">🛠️ 写作工具</div>
            <ul class="tool-list">
                <li class="tool-item active" data-tool="continue">
                    <span class="tool-icon">→</span>
                    <span>AI 续写</span>
                </li>
                <li class="tool-item" data-tool="expand">
                    <span class="tool-icon">📝</span>
                    <span>AI 扩写</span>
                </li>
                <li class="tool-item" data-tool="polish">
                    <span class="tool-icon">🎨</span>
                    <span>AI 润色</span>
                </li>
                <li class="tool-item" data-tool="brainstorm">
                    <span class="tool-icon">💡</span>
                    <span>头脑风暴</span>
                </li>
            </ul>

            <div class="sidebar-title" style="margin-top: 1.5rem;">📋 创作模板</div>
            <div class="templates">
                <div class="template-title">快速开始</div>
                <div class="template-tags">
                    <span class="template-tag" data-type="xianxia">修仙</span>
                    <span class="template-tag" data-type="city">都市</span>
                    <span class="template-tag" data-type="fantasy">玄幻</span>
                    <span class="template-tag" data-type="history">历史</span>
                    <span class="template-tag" data-type="scifi">科幻</span>
                    <span class="template-tag" data-type="mystery">悬疑</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="writing-panel">
                <div class="panel-header">
                    <h2 class="panel-title" id="currentTool">✏️ AI 续写</h2>
                    <span class="word-count" id="wordCount">0 字</span>
                </div>
                <textarea 
                    class="writing-area" 
                    id="writingArea" 
                    placeholder="在这里输入你的正文...

例如：
清晨的阳光透过窗帘，林墨缓缓睁开眼睛...
"
                ></textarea>
                <div class="action-bar">
                    <button class="btn btn-secondary" id="clearBtn">🗑️ 清空</button>
                    <button class="btn btn-primary" id="generateBtn">
                        ⚡ 生成
                    </button>
                </div>
            </div>

            <div class="output-panel">
                <div class="panel-header">
                    <h2 class="panel-title">📤 AI 输出</h2>
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <span>AI 正在创作中...</span>
                    </div>
                </div>
                <div class="output-content" id="outputContent">
                    <span class="output-placeholder">点击「生成」按钮，AI 将根据你的内容自动创作...</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 工具配置
        const tools = {
            continue: {
                name: 'AI 续写',
                icon: '→',
                prompt: '请续写以下网文故事，保持相同风格和节奏：'
            },
            expand: {
                name: 'AI 扩写',
                icon: '📝',
                prompt: '请扩写以下内容，增加细节描写和情节丰富度：'
            },
            polish: {
                name: 'AI 润色',
                icon: '🎨',
                prompt: '请润色以下文字，提升文笔和表达力：'
            },
            brainstorm: {
                name: '头脑风暴',
                icon: '💡',
                prompt: '请帮我想几个后续剧情发展方向：'
            }
        };

        // 模板提示词
        const templates = {
            xianxia: '修仙世界观，主角踏入仙途，历经磨难追求长生大道',
            city: '都市背景，主角拥有特殊能力，在现代社会中纵横捭阖',
            fantasy: '玄幻世界，主角获得神秘传承，修炼各种神奇功法',
            history: '历史穿越，主角回到古代，凭借现代知识搅动风云',
            scifi: '未来科幻，人类面临生存危机，主角带领文明寻找出路',
            mystery: '悬疑推理，层层迷雾笼罩，主角抽丝剥茧追寻真相'
        };

        let currentTool = 'continue';
        let selectedTemplate = '';

        // DOM 元素
        const writingArea = document.getElementById('writingArea');
        const wordCount = document.getElementById('wordCount');
        const outputContent = document.getElementById('outputContent');
        const generateBtn = document.getElementById('generateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const currentToolEl = document.getElementById('currentTool');

        // 字数统计
        writingArea.addEventListener('input', () => {
            const text = writingArea.value.trim();
            const count = text.length;
            wordCount.textContent = `${count} 字`;
        });

        // 工具切换
        document.querySelectorAll('.tool-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.tool-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                currentTool = item.dataset.tool;
                currentToolEl.textContent = `${tools[currentTool].icon} ${tools[currentTool].name}`;
            });
        });

        // 模板选择
        document.querySelectorAll('.template-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                selectedTemplate = templates[tag.dataset.type];
                writingArea.placeholder = `【${tag.textContent}】题材示例：

${selectedTemplate}

请开始你的创作...
`;
            });
        });

        // 清空按钮
        clearBtn.addEventListener('click', () => {
            writingArea.value = '';
            outputContent.innerHTML = '<span class="output-placeholder">点击「生成」按钮，AI 将根据你的内容自动创作...</span>';
            wordCount.textContent = '0 字';
        });

        // 生成按钮
        generateBtn.addEventListener('click', async () => {
            const content = writingArea.value.trim();
            if (!content) {
                outputContent.innerHTML = '<span style="color: #ff6b6b;">请先输入内容再生成</span>';
                return;
            }

            // 显示加载
            loading.classList.add('active');
            outputContent.innerHTML = '';
            generateBtn.disabled = true;

            try {
                // 调用 AI API（这里需要接入实际的 API）
                const result = await callAI(content, currentTool, selectedTemplate);
                outputContent.textContent = result;
            } catch (error) {
                outputContent.innerHTML = `<span style="color: #ff6b6b;">生成失败: ${error.message}</span>`;
            } finally {
                loading.classList.remove('active');
                generateBtn.disabled = false;
            }
        });

        // 扣子 API 配置
        const COZE_CONFIG = {
            apiUrl: 'https://btymj8bdxb.coze.site/stream_run',
            token: 'pat_gDTk6HZuzvwtjjPeWTGYuo9q0tYL2B72qVxzkwxdo62XzLm8FgOxsofYaorYb7mc',
            projectId: '7618099356960538678'
        };

        // AI 调用函数
        async function callAI(content, tool, template) {
            // 构建提示词
            const toolPrompts = {
                continue: '请接着上面的故事继续写，保持风格一致，300字左右。',
                expand: '请扩写上面的内容，增加细节描写和环境渲染，200字左右。',
                polish: '请优化上面的文字，提升文笔水平。',
                brainstorm: '请提供3-5个后续剧情发展的可能方向。'
            };
            
            const prompt = content + '\n\n' + toolPrompts[tool];
            
            try {
                // 调用扣子 API
                const response = await fetch(COZE_CONFIG.apiUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${COZE_CONFIG.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: {
                            query: {
                                prompt: [{
                                    type: 'text',
                                    content: {
                                        text: prompt
                                    }
                                }]
                            }
                        },
                        type: 'query',
                        project_id: COZE_CONFIG.projectId
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API调用失败: ${response.status}`);
                }
                
                const data = await response.json();
                
                // 解析返回内容
                if (data.content && data.content.message) {
                    return `【${tools[tool].name}结果】\n\n${data.content.message}\n\n---\n\n字数: ${content.length}字`;
                } else if (data.msg) {
                    return `【${tools[tool].name}结果】\n\n${data.msg}`;
                } else {
                    return `【${tools[tool].name}结果】\n\nAPI返回: ${JSON.stringify(data)}`;
                }
            } catch (error) {
                // 如果 API 调用失败，使用模拟数据
                console.error('API调用失败:', error);
                return `【${tools[tool].name}结果】\n\n⚠️ API暂时不可用，使用模拟数据。\n\n输入内容: ${content.substring(0, 50)}...\n\n工具: ${tools[tool].name}\n\n请检查 API 配置是否正确。`;
            }
        }
    </script>
</body>
</html>
